services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      firewall:
        condition: service_started
    # The agent container has no network of its own; it shares
    # the firewall's network namespace so all traffic is subject
    # to its iptables rules.
    network_mode: "service:firewall"
    stdin_open: true
    tty: true

  firewall:
    build:
      context: .
      dockerfile: firewall/Dockerfile
    # NET_ADMIN is required for iptables rules.
    cap_add:
      - NET_ADMIN
    environment:
      - BRIDGE_PORT=8080
    networks:
      - restricted
    expose:
      - "8080"

networks:
  restricted:
    driver: bridge
