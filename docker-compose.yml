services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BRIDGE_URL=http://sidecar:8080
      - RUST_LOG=${RUST_LOG:-info}
    depends_on:
      sidecar:
        condition: service_started
    # The agent container has no network of its own; it shares
    # the sidecar's network namespace so all traffic is subject
    # to the sidecar's iptables rules.
    network_mode: "service:sidecar"

  sidecar:
    build:
      context: .
      dockerfile: sidecar/Dockerfile
    # NET_ADMIN is required for iptables rules.
    cap_add:
      - NET_ADMIN
    environment:
      - BRIDGE_PORT=8080
    networks:
      - restricted
    expose:
      - "8080"

networks:
  restricted:
    driver: bridge
