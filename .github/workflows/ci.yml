name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy rustfmt
      - run: cargo fmt --all --check
      - run: cargo check --workspace
      - run: cargo clippy --workspace
      - run: cargo test --workspace
